<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 -->
  <circle cx="50" cy="50" r="48" fill="#FFF7ED" stroke="#FB923C" stroke-width="2.5"/>

  <!-- 귀 -->
  <polygon points="16,44 24,16 42,38" fill="#F97316"/>
  <polygon points="58,38 76,16 84,44" fill="#F97316"/>
  <!-- 귀 안쪽 -->
  <polygon points="20,41 24,20 39,37" fill="#FECDD3"/>
  <polygon points="61,37 76,20 80,41" fill="#FECDD3"/>

  <!-- 얼굴 -->
  <circle cx="50" cy="56" r="34" fill="#FEF3C7"/>

  <!-- 큰 블러시 -->
  <ellipse cx="28" cy="65" rx="10" ry="6" fill="#FCA5A5" opacity="0.55"/>
  <ellipse cx="72" cy="65" rx="10" ry="6" fill="#FCA5A5" opacity="0.55"/>

  <!-- 눈 — 크고 반짝이는 카와이 눈 -->
  <!-- 왼쪽 눈 -->
  <ellipse cx="37" cy="52" rx="8" ry="8.5" fill="#1C1917"/>
  <ellipse cx="34.5" cy="49" rx="2.8" ry="3.2" fill="white"/>
  <circle cx="39" cy="55" r="1.4" fill="white"/>
  <!-- 오른쪽 눈 -->
  <ellipse cx="63" cy="52" rx="8" ry="8.5" fill="#1C1917"/>
  <ellipse cx="60.5" cy="49" rx="2.8" ry="3.2" fill="white"/>
  <circle cx="65" cy="55" r="1.4" fill="white"/>

  <!-- 코 -->
  <path d="M 46.5 62 L 50 59.5 L 53.5 62 Z" fill="#F97316"/>

  <!-- 입 — 벌린 채 먹는 중 -->
  <path d="M 43 67 Q 50 74 57 67" fill="#FECACA" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 혀 -->
  <ellipse cx="50" cy="71" rx="4" ry="2.8" fill="#F87171"/>

  <!-- 수염 -->
  <line x1="10" y1="62" x2="33" y2="63" stroke="#D1D5DB" stroke-width="1.2"/>
  <line x1="10" y1="69" x2="33" y2="68" stroke="#D1D5DB" stroke-width="1.2"/>
  <line x1="67" y1="63" x2="90" y2="62" stroke="#D1D5DB" stroke-width="1.2"/>
  <line x1="67" y1="68" x2="90" y2="69" stroke="#D1D5DB" stroke-width="1.2"/>

  <!-- 앞발 -->
  <ellipse cx="33" cy="85" rx="11" ry="7" fill="#FEF3C7" stroke="#FDBA74" stroke-width="1.5"/>
  <ellipse cx="67" cy="85" rx="11" ry="7" fill="#FEF3C7" stroke="#FDBA74" stroke-width="1.5"/>

  <!-- 주먹밥 -->
  <ellipse cx="50" cy="83" rx="13" ry="9" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="37" y="85" width="26" height="6" rx="2.5" fill="#292524" opacity="0.82"/>

  <!-- 수증기 -->
  <path d="M 43 77 Q 41 73.5 43 70.5" stroke="#FB923C" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 50 75 Q 48 71.5 50 68.5" stroke="#FB923C" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 57 77 Q 55 73.5 57 70.5" stroke="#FB923C" stroke-width="1.4" fill="none" stroke-linecap="round"/>
